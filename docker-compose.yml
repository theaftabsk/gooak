version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oak_commerce_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_password_123
      POSTGRES_DB: oak_commerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: